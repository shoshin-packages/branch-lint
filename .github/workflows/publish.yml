name: Publish

on:
  push:
    branches:
      - master
      - dev

jobs:
  publish:
    name: Release
    runs-on: ubuntu-latest
    # Защита от бесконечных циклов при коммитах от бота semantic-release
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write   # для создания тегов и коммита version bump
      packages: write   # для публикации в GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Отключаем persist-credentials — semantic-release сам настроит git remote
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@shoshin-packages'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
