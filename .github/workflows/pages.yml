name: Deploy Docs

on:
  push:
    branches:
      - master
      - dev

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    uses: shoshin-packages/ci/.github/workflows/docs-build.yml@main
    with:
      # VitePress собирает в корневой public/ (outDir: '../public' в config.ts)
      output-dir: public
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    uses: shoshin-packages/ci/.github/workflows/docs-publish.yml@main
    with:
      docs-artifact-name: ${{ needs.build.outputs.artifact-name }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
